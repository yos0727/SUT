<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - My Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 360px; text-align: center; }
    .auth-card h2 { margin-top: 0; color: #111827; font-weight: 600; margin-bottom: 24px; }
    input { width: 100%; box-sizing: border-box; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; transition: all 0.2s; }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    button { width: 100%; padding: 12px; background-color: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
    button:hover { background-color: #4338ca; }
    .auth-links { margin-top: 20px; font-size: 14px; color: #6b7280; }
    .auth-links a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .auth-links a:hover { text-decoration: underline; }
    .flash-msgs { list-style: none; padding: 0; color: #dc2626; font-size: 14px; margin-bottom: 16px; background: #fef2f2; border-radius: 8px; padding: 10px; }
</style>
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flash-msgs">{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>
          {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="auth-links">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>
</body>
</html>
